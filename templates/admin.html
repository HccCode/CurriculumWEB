<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Interface - CV Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #3b82f6; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; }
        .dashboard { max-width: 1000px; margin: 0 auto; display: grid; gap: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #94a3b8; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: #cbd5e1; }
        input, textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 6px; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 100px; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        .btn { background: var(--accent); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #f8fafc;}
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 1rem 2rem; border-radius: 8px; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 100;}
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #ef4444; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>Panel de Control del Currículum</h1>
            <div>
                <a href="/" target="_blank" class="btn btn-outline" style="text-decoration:none; margin-right:10px;"><i class="fas fa-external-link-alt"></i> Ver CV Público</a>
                <button class="btn" onclick="saveData()"><i class="fas fa-save"></i> Guardar Cambios</button>
            </div>
        </div>

        <div class="panel">
            <h2><i class="fas fa-user"></i> Información General</h2>
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="p_name" value="{{ data.profile.name }}">
            </div>
            <div class="form-group">
                <label>Rol / Título Profesional</label>
                <input type="text" id="p_role" value="{{ data.profile.role }}">
            </div>
            <div class="form-group">
                <label>Biografía (Resumen)</label>
                <textarea id="p_bio">{{ data.profile.bio }}</textarea>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                <div class="form-group"><label>Ubicación</label><input type="text" id="p_location" value="{{ data.profile.location }}"></div>
                <div class="form-group"><label>Email</label><input type="text" id="p_email" value="{{ data.profile.email }}"></div>
                <div class="form-group"><label>GitHub URL</label><input type="text" id="p_github" value="{{ data.profile.github }}"></div>
                <div class="form-group"><label>LinkedIn URL</label><input type="text" id="p_linkedin" value="{{ data.profile.linkedin }}"></div>
            </div>
        </div>
        
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> Cambios guardados correctamente</div>

    <script>
        async function saveData() {
            const btn = document.querySelector('.btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            
            // Recopilamos la información editada
            const payload = {
                profile: {
                    name: document.getElementById('p_name').value,
                    role: document.getElementById('p_role').value,
                    bio: document.getElementById('p_bio').value,
                    location: document.getElementById('p_location').value,
                    email: document.getElementById('p_email').value,
                    github: document.getElementById('p_github').value,
                    linkedin: document.getElementById('p_linkedin').value,
                    resume_link: "CV_Hector_Uribe.pdf"
                },
                // Inyectamos la experiencia y proyectos existentes para no borrarlos
                experience: {{ data.experience | tojson | safe }}, 
                projects: {{ data.projects | tojson | safe }}
            };

            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const toast = document.getElementById('toast');
                if(res.ok) {
                    toast.innerHTML = '<i class="fas fa-check-circle"></i> Cambios guardados correctamente';
                    toast.className = 'toast show';
                } else {
                    toast.innerHTML = '<i class="fas fa-exclamation-circle"></i> Error al guardar';
                    toast.className = 'toast show error';
                }
                setTimeout(() => toast.classList.remove('show'), 3000);
            } catch (error) {
                console.error(error);
                alert("Error de conexión con el servidor");
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> Guardar Cambios';
            }
        }
    </script>
</body>
</html>
